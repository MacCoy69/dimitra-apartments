# Netlify-Konfiguration – Dimitra Beach Apartments
# Mehrsprachige Website (Eleventy-Build) im Ordner /web, Ausgabe /web/_site.

[build]
  base = "web"
  command = "npm install && npx @11ty/eleventy"
  publish = "_site"

# Sicherheits- & Cache-Header (optional, sinnvoll für statische Seiten)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
